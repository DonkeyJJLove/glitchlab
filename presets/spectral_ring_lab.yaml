spectral_ring_lab:
  # Opcjonalnie można dodać edge_mask, ale tu skupiamy się na widmie
  amplitude: { kind: none, strength: 1.0 }
  steps:
    - name: spectral_shaper
      params:
        mode: ring           # 'ring' | 'bandpass' | 'bandstop' | 'direction'
        low: 0.12
        high: 0.32
        boost: 1.20          # >0 podbija, <0 tłumi
        soft: 0.06           # piórko maski
        blend: 0.10          # miks z oryginałem w dziedzinie obrazu
