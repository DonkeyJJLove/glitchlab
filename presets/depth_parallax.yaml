depth_parallax:

  steps:
    - { name: depth_parallax, params: { scale: 70, freq: 100.0, octaves: 5, shading: true, stereo: true } }
    - { name: rgb_offset, params: { r: [10,0], g: [-8,0], b: [12,0] } }
    - { name: wave_distort, params: { axis: "x", amplitude: 20, frequency: 0.04 } }
    - { name: wave_distort, params: { axis: "y", amplitude: 15, frequency: 0.03 } }
    - { name: pixel_sort, params: { direction: "vertical", length: 200 } }
    - { name: block_mosh, params: { size: 12, p: 0.8, max_shift: 80 } }
    - { name: channel_shuffle }
    - { name: noise, params: { amount: 20 } }
    - { name: protect_edges, params: { keep: 0.7 } }
