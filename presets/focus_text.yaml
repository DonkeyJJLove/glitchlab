edge_mask:
  thresh: 72
  dilate: 3
amplitude:
  kind: linear_x   # assume symbols live more on the right; increase there
  strength: 1.2

# Optional ROI polygons/rects can be added by the user via --config:
# rois_yaml: |
#   rects:
#     - [100, 420, 600, 220]   # e.g., eagle region (x,y,w,h)
#     - [620, 260, 420, 380]   # star region

steps:
  - { name: rgb_offset, params: { r: [2,0], g: [-1,1], b: [3,-1] } }
  - { name: stripes, params: { bands: 16, max_h: 40, max_dx: 100 } }
  - { name: block_mosh, params: { size: 26, p: 0.38, max_shift: 14 } }
  - { name: scanlines, params: { period: 2, strength: 0.12 } }
  - { name: posterize, params: { bits: 5 } }
  - { name: noise, params: { amount: 10 } }
  - { name: protect_edges, params: { keep: 0.93 } }
