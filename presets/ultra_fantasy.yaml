depth_fantasy:

  edge_mask:
    thresh: 60
    dilate: 6

  amplitude:
    kind: linear_x
    strength: 3.0

  steps:
    - { name: rgb_offset, params: { r: [15,0], g: [-12,0], b: [18,0] } }
    - { name: depth_displace, params: { depth_map: noise_fractal, scale: 70, octaves: 6, freq: 100.0, stereo: true } }
    - { name: wave_distort, params: { axis: "x", amplitude: 40, frequency: 0.07 } }
    - { name: wave_distort, params: { axis: "y", amplitude: 30, frequency: 0.05 } }
    - { name: pixel_sort, params: { direction: "vertical", length: 300 } }
    - { name: block_mosh, params: { size: 20, p: 0.9, max_shift: 140 } }
    - { name: channel_shuffle }
    - { name: posterize, params: { bits: 3 } }
    - { name: noise, params: { amount: 35 } }
    - { name: protect_edges, params: { keep: 0.65 } }
