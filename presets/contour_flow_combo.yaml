contour_flow_combo:
  edge_mask: { thresh: 60, dilate: 1, ksize: 3 }
  amplitude:
    kind: perlin
    strength: 1.0
    scale: 128.0
    octaves: 4
    persistence: 0.5
    lacunarity: 2.0
    base: 7
  steps:
    - name: anisotropic_contour_warp
      params:
        amp_px: 24.0
        cycles: 10.0
        phase_deg: 0.0
        border: wrap
        use_ctx_amp: true
        amp_gamma: 1.2
    - name: spectral_shaper
      params:
        mode: direction
        angle_deg: 0.0       # pas poziomy (możesz spróbować 90.0 dla pionowego)
        ang_width: 30.0
        low: 0.00
        high: 0.50
        boost: 0.30
        soft: 0.05
        blend: 0.20
